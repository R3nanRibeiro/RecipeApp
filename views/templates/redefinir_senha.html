{% extends "base.html" %}

{% block title %}Redefinir Senha{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-form">
            <h2>Redefinir Senha</h2>
            <p>Digite sua nova senha para o e-mail: <strong>{{ email }}</strong></p>

            <form method="POST" action="{{ url_for('redefinir_senha', token=token) if token else url_for('redefinir_senha') }}">
                <div class="form-group">
                    <label for="nova_senha">Nova Senha *</label>
                    <input type="password" id="nova_senha" name="nova_senha" placeholder="Digite a nova senha" required>
                    <small>Mínimo de 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label for="confirmar_senha">Confirmar Nova Senha *</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirme a nova senha" required>
                </div>

                <button type="submit" class="btn-primary">Redefinir Senha</button>
            </form>

            <p class="auth-link">
                <a href="{{ url_for('login') }}">Voltar para o login</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
